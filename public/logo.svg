<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <defs>
    <linearGradient id="sproutGrad" x1="60" y1="85" x2="60" y2="20" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006FEE"/>
      <stop offset="100%" stop-color="#7828C8"/>
    </linearGradient>
    <linearGradient id="bracketGrad" x1="10" y1="60" x2="110" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006FEE"/>
      <stop offset="100%" stop-color="#7828C8"/>
    </linearGradient>
  </defs>

  <!-- Left angle bracket < -->
  <path d="M38 50 L18 65 L38 80" stroke="url(#bracketGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right angle bracket > -->
  <path d="M82 50 L102 65 L82 80" stroke="url(#bracketGrad)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Slash / between brackets -->
  <line x1="66" y1="48" x2="54" y2="82" stroke="url(#bracketGrad)" stroke-width="6" stroke-linecap="round" opacity="0.5"/>

  <!-- Stem growing upward from center -->
  <path d="M60 68 Q60 45 60 35" stroke="url(#sproutGrad)" stroke-width="4.5" stroke-linecap="round" fill="none"/>

  <!-- Left leaf -->
  <path d="M60 42 Q48 28 38 22 Q46 34 56 40" fill="url(#sproutGrad)" opacity="0.9"/>

  <!-- Right leaf -->
  <path d="M60 34 Q72 20 82 16 Q74 28 64 34" fill="url(#sproutGrad)"/>

  <!-- Small center bud -->
  <ellipse cx="60" cy="24" rx="4" ry="5" fill="#7828C8" opacity="0.8"/>
</svg>
