<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" fill="none">
  <defs>
    <!-- Dark greenish-blue gradient -->
    <linearGradient id="easyGrad" x1="0" y1="0" x2="200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#064E3B"/>
      <stop offset="100%" stop-color="#0F766E"/>
    </linearGradient>
  </defs>

  <!-- Text Logo -->
  <text 
    x="50%" 
    y="55%" 
    dominant-baseline="middle" 
    text-anchor="middle"
    font-size="48"
    font-family="Segoe UI, Arial, sans-serif"
    font-weight="700"
    fill="url(#easyGrad)">
    Easy
  </text>
</svg>
